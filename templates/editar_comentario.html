<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>✏️ Comentário - {{ projeto }} / {{ versao }}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <h1>✏️ Comentário da versão {{ versao }}</h1>

    <form method="post">
        <textarea name="comentario" rows="6" style="width:100%;">{{ comentario }}</textarea>

        <br><br>

        <button class="btn" type="submit">💾 Salvar comentário</button>
        <a class="btn-secondary" href="/timeline/{{ projeto }}">Cancelar</a>
    </form>
</div>

</body>
</html>
