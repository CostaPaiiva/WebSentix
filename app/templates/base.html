<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}WebSentix{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/css/styles.css') }}">
</head>
<body>
    <div class="page-shell">
        <header class="topbar">
            <div>
                <h1>📊 WebSentix</h1>
                <p>Plataforma web para análise de sentimentos por texto, URL e arquivos.</p>
            </div>
            <div class="topbar-actions">
                <a class="btn btn-light" href="/exports/history/excel">Exportar histórico</a>
            </div>
        </header>

        <main class="container">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script src="{{ url_for('static', path='/js/app.js') }}"></script>
</body>
</html>
