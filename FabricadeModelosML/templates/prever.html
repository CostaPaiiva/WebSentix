<!DOCTYPE html> <!-- Define que o documento segue o padrão HTML5 -->
<html>
<head>
    <title>Previsões</title> <!-- Título exibido na aba do navegador -->
    <link rel="stylesheet" href="/static/style.css"> <!-- Importa o arquivo CSS externo para estilização -->
</head>
<body>

<h1>🔮 Fazer Previsões</h1> <!-- Cabeçalho principal da página -->

<div class="card"> <!-- Card estilizado para agrupar o formulário -->
<form method="POST" enctype="multipart/form-data"> <!-- Formulário que envia dados via POST e permite upload de arquivos -->

    <p>Escolha o projeto:</p> <!-- Texto explicativo -->
    <select name="projeto"> <!-- Menu suspenso para selecionar o projeto -->
        {% for p in projetos %} <!-- Estrutura Jinja para iterar sobre a lista de projetos -->
            <option value="{{p}}">{{p}}</option> <!-- Cada projeto vira uma opção no select -->
        {% endfor %}
    </select>

    <br><br>

    <p>Envie o CSV para prever:</p> <!-- Texto explicativo -->
    <input type="file" name="file" required> <!-- Campo para upload do arquivo CSV obrigatório -->

    <br><br>

    <button type="submit">Gerar Previsão</button> <!-- Botão que envia o formulário para gerar previsões -->

</form>
</div>

<br>
<a href="/">⬅ Voltar</a> <!-- Link para voltar à página inicial -->

</body>
</html>
