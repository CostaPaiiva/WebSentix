<!DOCTYPE html>
<html>
<head>
    <title>Versões do Modelo</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>📦 Versões do projeto: {{ projeto }}</h1>

<div class="card">
    <table>
        <tr>
            <th>Versão</th>
            <th>Modelo</th>
            <th>Score</th>
            <th>Data</th>
            <th>Status</th>
        </tr>
        {% for v in versoes %}
        <tr>
            <td>{{ v.versao }}</td>
            <td>{{ v.modelo }}</td>
            <td>{{ v.score }}</td>
            <td>{{ v.data }}</td>
            <td>
                {% if v.producao %}
                    🟢 Produção
                {% else %}
                    ⚪ Teste
                {% endif %}
            </td>
        </tr>
        {% endfor %}
    </table>
</div>

</body>
</html>
