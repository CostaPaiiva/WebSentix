<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>🏭 Fábrica de Modelos</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- Overlay de loading (fica escondido até clicar em Treinar) -->
<div id="loading-overlay">
    <div class="loader-card">
        <div class="spinner"></div>
        <h2>🧠 Treinando modelos...</h2>
        <p>Isso pode levar alguns minutos.<br>Não feche o navegador.</p>
    </div>
</div>

<!-- Conteúdo normal da página -->
<div class="container">

    <h1 class="title">🏭 Fábrica de Modelos</h1>
    <p class="subtitle">
        Crie modelos de Machine Learning automaticamente a partir de CSV
    </p>

    <div class="card big-card">
        <h2>🚀 Treinar novo modelo</h2>

        <form method="POST" enctype="multipart/form-data" class="train-form" onsubmit="mostrarLoading()">

            <!-- Botão de escolher arquivo -->
            <label class="file-label">
                📂 Escolher arquivo CSV
                <input type="file" name="file" required>
            </label>

            <!-- Botão de treinar -->
            <button type="submit" class="btn-primary big-btn">
                ⚙️ Treinar Modelo
            </button>

        </form>
    </div>

</div>

<!-- Script que mostra a tela de loading -->
<script>
function mostrarLoading() {
    // Mostra o overlay de carregamento
    document.getElementById("loading-overlay").style.display = "flex";
}
</script>

</body>
</html>
