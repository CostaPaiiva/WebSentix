<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>📈 Evolução das Versões - {{ projeto }}</title>
    <link rel="stylesheet" href="/static/style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container">

    <h1 class="title">📈 Evolução de Performance</h1>
    <p class="subtitle">Projeto: {{ projeto }}</p>

    <!-- ================= -->
    <!-- GRÁFICO -->
    <!-- ================= -->
    <div class="card">
        <canvas id="graficoEvolucao"></canvas>
    </div>

    <!-- ================= -->
    <!-- TABELA -->
    <!-- ================= -->
    <div class="card" style="margin-top:40px;">
        <table class="compare-table">
            <tr>
                <th>Versão</th>
                <th>Data</th>
                <th>Tipo</th>
                <th>Melhor Modelo</th>
                <th>Score</th>
            </tr>

            {% for v in historico %}
            <tr>
                <td>{{ v.versao }}</td>
                <td>{{ v.data }}</td>
                <td>{{ v.tipo_problema }}</td>
                <td>{{ v.melhor_modelo }}</td>
                <td>{{ "%.4f"|format(v.melhor_score) }}</td>
            </tr>
            {% endfor %}
        </table>
    </div>

    <div style="margin-top:50px;">
        <a href="/dashboard/{{ projeto }}" class="btn-secondary big-btn">🔙 Voltar</a>
    </div>

</div>

<script>
const ctx = document.getElementById("graficoEvolucao");

// Dados vindos do Flask
const versoes = [
    {% for v in historico %}
        "{{ v.versao }}",
    {% endfor %}
];

const scores = [
    {% for v in historico %}
        {{ v.melhor_score }},
    {% endfor %}
];

new Chart(ctx, {
    type: "line",
    data: {
        labels: versoes,
        datasets: [{
            label: "Evolução do Score",
            data: scores,
            borderWidth: 3,
            tension: 0.3,
            fill: true
        }]
    },
    options: {
        responsive: true,
        animation: {
            duration: 2000,
            easing: "easeOutQuart"
        },
        scales: {
            y: {
                beginAtZero: false
            }
        }
    }
});
</script>

</body>
</html>
