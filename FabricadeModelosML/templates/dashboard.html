<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>📊 Dashboard - {{ projeto }}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">

    <!-- Título -->
    <h1 class="title">Teste de Modelos</h1>
    <p class="subtitle">Resultado do treinamento do modelo</p>

    <!-- Grid de cards -->
    <div class="dashboard-grid">

        <!-- Card do relatório -->
        <div class="card dashboard-card">
            <h2>📄 Relatório do Modelo</h2>

            <!-- Caixa com rolagem para o texto -->
            <div class="report-box">
                <pre>{{ texto }}</pre>
            </div>
        </div>

        <!-- Card do ranking -->
        <div class="card dashboard-card">
            <h2>🏆 Ranking dos Modelos</h2>

            <!-- Lista de ranking dentro do card -->
            <ul class="ranking-list">
                {% for nome, score in resultados %}
                    <li
                        {% if loop.index0 == 0 %}class="top1"{% endif %}
                        {% if loop.index0 == 1 %}class="top2"{% endif %}
                        {% if loop.index0 == 2 %}class="top3"{% endif %}
                    >
                        {{ nome }} <span>{{ score }}</span>
                    </li>
                {% endfor %}
            </ul>
        </div>

    </div>

    <!-- Área de botões -->
    <div class="dashboard-actions">

        <!-- Botão de baixar PDF -->
        <a href="/baixar_pdf/{{ projeto }}" class="btn-primary big-btn">
            📥 Baixar Relatório em PDF
        </a>

        <!-- Botão de voltar -->
        <a href="/" class="btn-secondary big-btn">
            🔙 Treinar outro modelo
        </a>

    </div>

</div>

</body>
</html>
