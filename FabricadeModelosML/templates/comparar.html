<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>⚖️ Comparação - {{ projeto }}</title>
    <link rel="stylesheet" href="/static/style.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container">

    <h1 class="title">⚖️ Comparação de Modelos</h1>
    <p class="subtitle">Projeto: {{ projeto }}</p>

    <!-- Card do gráfico -->
    <div class="card">
        <canvas id="graficoComparacao"></canvas>
    </div>

    <!-- Tabela -->
    <div class="card" style="margin-top:40px;">
        <table class="compare-table">
            <tr>
                <th>Modelo</th>
                <th>Score</th>
            </tr>

            {% for nome, score in resultados %}
            <tr>
                <td>{{ nome }}</td>
                <td>{{ "%.4f"|format(score) }}</td>
            </tr>
            {% endfor %}
        </table>
    </div>

    <div style="margin-top:50px;">
        <a href="/dashboard/{{ projeto }}" class="btn-secondary big-btn">🔙 Voltar</a>
    </div>

</div>

<script>
const ctx = document.getElementById("graficoComparacao");

// Dados vindos do Flask
const nomes = {{ nomes | tojson }};
const scores = {{ scores | tojson }};

new Chart(ctx, {
    type: "bar",
    data: {
        labels: nomes,
        datasets: [{
            label: "Score dos Modelos",
            data: scores,
            borderWidth: 2
        }]
    },
    options: {
        responsive: true,
        animation: {
            duration: 2000,   // animação suave
            easing: "easeOutQuart"
        },
        scales: {
            y: {
                beginAtZero: true
            }
        }
    }
});
</script>

</body>
</html>
